<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala - Pastamania</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfcf5;
            --header-bg: #f8f1e5;
            --primary-text: #3e2723;
            --accent-color: #e67e22;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--primary-text); }

        .header { background-color: var(--header-bg); padding: 20px; text-align: center; box-shadow: var(--shadow); border-bottom: 2px solid #eae0d0; }
        .header h1 { margin: 0; font-family: 'Playfair Display', serif; font-size: 2.5em; color: #8d6e63; }
        .header h2 { margin: 5px 0 0 0; font-weight: 400; font-size: 1.1em; opacity: 0.8; }

        /* Estructura dividida para el panel y el registro */
        .layout { display: flex; flex-wrap: wrap; max-width: 1200px; margin: auto; padding: 20px; gap: 30px; }
        .panel-mesas { flex: 2; min-width: 300px; }
        .panel-registro { flex: 1; min-width: 250px; background: white; padding: 20px; border-radius: 15px; box-shadow: var(--shadow); border: 2px solid #eae0d0; max-height: 70vh; overflow-y: auto; display: flex; flex-direction: column;}

        /* Cabecera del registro con botón de borrado */
        .cabecera-registro { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f1f1; padding-bottom: 10px; margin-bottom: 10px; }
        .cabecera-registro h3 { margin: 0; }
        
        #btn-limpiar { 
            background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 8px; 
            font-family: 'Poppins', sans-serif; font-size: 0.8em; cursor: pointer; transition: 0.2s;
        }
        #btn-limpiar:hover { background: #c0392b; transform: scale(1.05); }

        .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f1f1; font-weight: 600;}
        .log-item .hora { opacity: 0.6; font-weight: 400;}

        /* Grid de mesas */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 15px; padding: 20px 0; }
        button.mesa-btn { aspect-ratio: 1 / 1; font-size: 22px; font-weight: 600; cursor: pointer; background: white; color: var(--primary-text); border: 2px solid #eae0d0; border-radius: 12px; box-shadow: var(--shadow); transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;}
        button.mesa-btn:hover { transform: translateY(-3px); border-color: var(--accent-color); color: var(--accent-color); }
        button.mesa-btn:active { background-color: var(--accent-color); color: white; transform: translateY(1px); }

        #notificacion { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; font-weight: 600; z-index: 100; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pastamania</h1>
        <h2>Panel de Sala - Marchar Mesa</h2>
    </div>

    <div class="layout">
        <div class="panel-mesas">
            <div class="grid" id="contenedor-mesas"></div>
        </div>

        <div class="panel-registro">
            <div class="cabecera-registro">
                <h3>Registro</h3>
                <button id="btn-limpiar" title="Borrar todo el historial">🗑️ Limpiar</button>
            </div>
            <div id="lista-registro"></div>
        </div>
    </div>

    <div id="notificacion">Mesa enviada</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"; 
        // ¡Importante! Añadimos 'remove' para poder borrar datos
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCS-znEaMQJmzRcraK2v0dfV3S_rCwA8w",
            authDomain: "comandasrestaurante.firebaseapp.com",
            databaseURL: "https://comandasrestaurante-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comandasrestaurante",
            storageBucket: "comandasrestaurante.firebasestorage.app",
            messagingSenderId: "242359011020",
            appId: "1:242359011020:web:70d0e9fd5712b1d3662469"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const cocinaRef = ref(db, 'mesas_cocina');
        const historialRef = ref(db, 'historial_mesas');

        const contenedor = document.getElementById('contenedor-mesas');
        const listaRegistro = document.getElementById('lista-registro');
        const notif = document.getElementById('notificacion');
        const btnLimpiar = document.getElementById('btn-limpiar');

        // Generar botones de mesas
        for (let i = 1; i <= 70; i++) {
            let btn = document.createElement('button');
            btn.className = 'mesa-btn';
            btn.innerText = i;
            btn.onclick = () => marcharMesa(i);
            contenedor.appendChild(btn);
        }

        // Función para enviar mesa a cocina y guardar en registro
        function marcharMesa(numero) {
            const horaActual = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const datosMesa = { mesa: numero, hora: horaActual };
            
            push(cocinaRef, datosMesa);
            push(historialRef, datosMesa);
            
            notif.innerText = `Mesa ${numero} a Cocina`;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 2000);
        }

        // Botón para borrar el historial
        btnLimpiar.onclick = () => {
            if(confirm("¿Estás seguro de que quieres borrar todo el registro de hoy?")) {
                remove(historialRef);
            }
        };

        // Escuchar el historial
        onValue(historialRef, (snapshot) => {
            listaRegistro.innerHTML = '';
            const datos = snapshot.val();
            if (datos) {
                const arrayMesas = Object.values(datos).reverse(); 
                arrayMesas.forEach(mesa => {
                    listaRegistro.innerHTML += `<div class="log-item"><span>Mesa ${mesa.mesa}</span> <span class="hora">${mesa.hora}</span></div>`;
                });
            } else {
                listaRegistro.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:20px;">Aún no hay mesas marchadas</p>';
            }
        });
    </script>
</body>
</html>
