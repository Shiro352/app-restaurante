<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala - Pastamania</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfcf5;      /* Beige muy claro */
            --header-bg: #f8f1e5;     /* Beige ligeramente más oscuro */
            --primary-text: #3e2723; /* Marrón café oscuro */
            --accent-color: #e67e22;  /* Terracotta/Naranja suave */
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            color: var(--primary-text); 
        }

        /* Cabecera Pastamania */
        .header {
            background-color: var(--header-bg);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border-bottom: 2px solid #eae0d0;
        }
        .header h1 { 
            margin: 0; 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5em; 
            color: #8d6e63; /* Marrón más suave */
        }
        .header h2 { 
            margin: 5px 0 0 0; 
            font-weight: 400; 
            font-size: 1.1em; 
            opacity: 0.8;
        }

        .container { padding: 20px; max-width: 800px; margin: auto; }

        /* Grid de mesas */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
            gap: 15px; 
            padding: 20px 0; 
        }

        button.mesa-btn { 
            aspect-ratio: 1 / 1; /* Botones cuadrados */
            font-size: 22px; 
            font-weight: 600;
            cursor: pointer; 
            background: white; 
            color: var(--primary-text); 
            border: 2px solid #eae0d0; 
            border-radius: 12px; 
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
        }

        button.mesa-btn:hover { 
            transform: translateY(-3px); 
            border-color: var(--accent-color); 
            color: var(--accent-color);
        }

        button.mesa-btn:active { 
            background-color: var(--accent-color); 
            color: white; 
            transform: translateY(1px);
        }

        /* Notificación simple customizada (reemplaza alert) */
        #notificacion {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #2ecc71; color: white; padding: 15px 30px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none; font-weight: 600; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pastamania</h1>
        <h2>Panel de Sala - Marchar Mesa</h2>
    </div>

    <div class="container">
        <div class="grid" id="contenedor-mesas"></div>
    </div>

    <div id="notificacion">Mesa enviada</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"; // REVISA VERSIÓN
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCS-znEaMQJmzRcraK2v0dfV3S_rCwA8w",
            authDomain: "comandasrestaurante.firebaseapp.com",
            databaseURL: "https://comandasrestaurante-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comandasrestaurante",
            storageBucket: "comandasrestaurante.firebasestorage.app",
            messagingSenderId: "242359011020",
            appId: "1:242359011020:web:70d0e9fd5712b1d3662469"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mesasRef = ref(db, 'mesas_activas');

        const contenedor = document.getElementById('contenedor-mesas');
        const notif = document.getElementById('notificacion');

        for (let i = 1; i <= 70; i++) {
            let btn = document.createElement('button');
            btn.className = 'mesa-btn';
            btn.innerText = i;
            btn.onclick = () => marcharMesa(i);
            contenedor.appendChild(btn);
        }

        function marcharMesa(numero) {
            const horaActual = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            push(mesasRef, {
                mesa: numero,
                hora: horaActual
            });
            
            // Feedback visual elegante en lugar de alert
            notif.innerText = `Mesa ${numero} marchada`;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
