<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina - Pastamania</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfcf5;
            --header-bg: #f8f1e5;
            --primary-text: #3e2723;
            --danger-color: #d9534f; /* Rojo suave para comandas */
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--bg-color); color: var(--primary-text); text-align: center; }

        .header { background-color: var(--header-bg); padding: 20px; box-shadow: var(--shadow); border-bottom: 2px solid #eae0d0; }
        .header h1 { margin: 0; font-family: 'Playfair Display', serif; font-size: 2.5em; color: #8d6e63; }
        .header h2 { margin: 5px 0 0 0; font-weight: 400; font-size: 1.1em; opacity: 0.8; }

        #btn-conectar { background: #28a745; color: white; padding: 15px 30px; font-size: 18px; font-weight: 600; border: none; cursor: pointer; border-radius: 50px; margin-top: 30px; box-shadow: 0 4px 10px rgba(40,167,69,0.3); transition: all 0.2s;}
        #btn-conectar:hover { background: #218838; transform: scale(1.05); }

        #lista-mesas { display: flex; flex-direction: column; gap: 15px; padding: 30px 20px; max-width: 500px; margin: auto; }

        /* Tarjeta de mesa en cocina */
        .mesa-item { 
            background: var(--danger-color); 
            color: white;
            padding: 20px 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(217,83,79,0.2);
            display: flex; justify-content: space-between; align-items: center;
            animation: aparecer 0.3s ease-out;
        }
        .mesa-numero { font-size: 32px; font-weight: 600; }
        .mesa-hora { font-size: 18px; opacity: 0.9; background: rgba(0,0,0,0.1); padding: 5px 10px; border-radius: 8px;}

        h2.vacio { opacity: 0.5; margin-top: 50px; font-weight: 400;}

        @keyframes aparecer { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pastamania</h1>
        <h2>Pantalla de Cocina</h2>
    </div>

    <button id="btn-conectar">🔔 Activar Sonido y Conectar</button>
    <div id="lista-mesas"></div>

    <audio id="sonido-alarma" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"; // REVISA VERSIÓN
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

           const firebaseConfig = {
            apiKey: "AIzaSyCCS-znEaMQJmzRcraK2v0dfV3S_rCwA8w",
            authDomain: "comandasrestaurante.firebaseapp.com",
            databaseURL: "https://comandasrestaurante-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comandasrestaurante",
            storageBucket: "comandasrestaurante.firebasestorage.app",
            messagingSenderId: "242359011020",
            appId: "1:242359011020:web:70d0e9fd5712b1d3662469"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mesasRef = ref(db, 'mesas_activas');

        const contenedor = document.getElementById('lista-mesas');
        const sonido = document.getElementById('sonido-alarma');
        const btnConectar = document.getElementById('btn-conectar');
        let cantidadAnterior = 0;
        let sonidoActivado = false;

        btnConectar.onclick = () => {
            sonidoActivado = true;
            btnConectar.style.display = 'none';
            // Play y pausa rápido para desbloquear el audio en el navegador
            sonido.play().then(() => { sonido.pause(); sonido.currentTime = 0; }); 
        };

        onValue(mesasRef, (snapshot) => {
            contenedor.innerHTML = '';
            const datos = snapshot.val();
            
            if (datos) {
                const keys = Object.keys(datos);
                const cantidadActual = keys.length;

                // Sonar si entra una nueva
                if (cantidadActual > cantidadAnterior && sonidoActivado && cantidadAnterior !== 0) {
                    sonido.play();
                }
                cantidadAnterior = cantidadActual;

                keys.forEach(key => {
                    const mesa = datos[key];
                    let div = document.createElement('div');
                    div.className = 'mesa-item';
                    div.innerHTML = `<span class="mesa-numero">Mesa ${mesa.mesa}</span> <span class="mesa-hora">${mesa.hora}</span>`;
                    contenedor.appendChild(div);
                });
            } else {
                cantidadAnterior = 0;
                contenedor.innerHTML = '<h2 class="vacio">No hay mesas marchadas</h2>';
            }
        });
    </script>
</body>
</html>
